name: K8s Homelab CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.31.0'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.16.0'

      - name: Validate Kubernetes manifests
        run: |
          echo "Validating Kubernetes manifests..."
          find k8s/ -name "*.yaml" -o -name "*.yml" | xargs -I {} kubectl apply --dry-run=client -f {} 2>&1 || true

      - name: Lint Helm values (if present)
        run: |
          if [ -d "helm/" ]; then
            echo "Linting Helm charts..."
            find helm/ -name "Chart.yaml" | while read chart; do
              helm lint $(dirname $chart)
            done
          else
            echo "No Helm charts found, skipping..."
          fi

      - name: Check YAML syntax
        run: |
          echo "Checking YAML syntax..."
          find . -name "*.yaml" -o -name "*.yml" | grep -v ".github" | while read file; do
            python3 -c "import yaml, sys; yaml.safe_load_all(open('$file'))" && echo "OK: $file" || echo "FAIL: $file"
          done

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Print summary
        run: |
          echo "## CI Pipeline Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Kubernetes manifests validated" >> $GITHUB_STEP_SUMMARY
          echo "- YAML syntax checked" >> $GITHUB_STEP_SUMMARY
          echo "- Helm charts linted" >> $GITHUB_STEP_SUMMARY
